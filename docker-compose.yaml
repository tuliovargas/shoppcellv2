services:
  app:
    build: docker/app
    container_name: app
    # bash explícito: bind .:/var/www traz o repo do host; sem +x o exec do path direto falha (ex.: rsync do Windows).
    entrypoint: ["/bin/bash", "./docker/app/entrypoint.sh"]
    restart: always
    environment:
      - TZ=${TZ:-UTC}
    volumes:
      - .:/var/www
      - ./docker/app/dev.ini:/usr/local/etc/php/conf.d/custom.ini
      - "/etc/localtime:/etc/localtime:ro"
    networks:
      - app-network
    depends_on:
      db:
        condition: service_healthy

  node:
    build: docker/node
    container_name: node
    restart: always
    ports:
      - "3000:3000"
      - "35729:35729"
    volumes:
      - .:/home/node/app
    networks:
      - app-network

  nginx:
    build: docker/nginx
    container_name: nginx
    entrypoint: ["/bin/sh", "./docker/nginx/entrypoint.sh"]
    restart: always
    tty: true
    ports:
      - "8000:80"
    environment:
      TZ: ${TZ:-UTC}
    volumes:
      - .:/var/www
      - "./docker/nginx/ssl:/etc/nginx/ssl/custom:ro"
      - "/etc/localtime:/etc/localtime:ro"
    networks:
      - app-network
    depends_on:
      - app


  db:
    build: docker/mariadb
    container_name: db
    restart: always
    tty: true
    # Script oficial da imagem MariaDB (evita falhas com mysqladmin/sockets em versões novas).
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 10s
      timeout: 10s
      retries: 36
      start_period: 120s
    ports:
      - "3306:3306"
    volumes:
      - ./docker/dumps:/tmp
      - ./docker/dbdata:/var/lib/mysql
      - ./docker/mysql:/docker-entrypoint-initdb.d
      - "/etc/localtime:/etc/localtime:ro"
    environment:
      - TZ=${TZ:-UTC}
      - MYSQL_DATABASE=env_db
      - MYSQL_ROOT_PASSWORD=root
    networks:
      - app-network

  phpmyadmin:
    build: docker/pma
    restart: always
    container_name: shopping-phpmyadmin
    depends_on:
      db:
        condition: service_healthy
    ports:
      - 8081:80
    volumes:
      - ./docker/pma:/var/www/app/
    environment:
      - PMA_HOST=db
      - MYSQL_ROOT_PASSWORD=root
      - PMA_ARBITRARY=1
      - PMA_PORT=3306
    networks:
      - app-network

networks:
  app-network:
    driver: bridge
