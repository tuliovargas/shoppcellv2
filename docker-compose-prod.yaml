services:
  app:
    build: docker/app
    container_name: app
    entrypoint: ["/bin/bash", "./docker/app/entrypoint.sh"]
    restart: always
    environment:
      - TZ=${TZ:-UTC}
    volumes:
      - .:/var/www
      - ./docker/app/prod.ini:/usr/local/etc/php/conf.d/custom.ini
      - "/etc/localtime:/etc/localtime:ro"
    networks:
      - app-network
    depends_on:
      db:
        condition: service_healthy

  nginx:
    build: docker/nginx
    container_name: nginx
    entrypoint: ["/bin/sh", "./docker/nginx/entrypoint.sh"]
    restart: always
    tty: true
    ports:
      - "80:80"
      - "443:443"
    environment:
      TZ: ${TZ:-UTC}
    volumes:
      - .:/var/www
      - "./docker/nginx/ssl:/etc/nginx/ssl/custom:ro"
      - "/etc/localtime:/etc/localtime:ro"
    networks:
      - app-network
    depends_on:
      - app

  # Uso pontual: docker compose run --rm certbot certonly ... (ver scripts/letsencrypt-issue.sh)
  certbot:
    image: certbot/certbot:v2.11.0
    volumes:
      - ./docker/certbot/conf:/etc/letsencrypt
      - .:/var/www

  db:
    build: docker/mariadb
    container_name: db
    restart: always
    tty: true
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 10s
      timeout: 10s
      retries: 36
      start_period: 120s
    ports:
      - "3306:3306"
    volumes:
      - ./docker/dumps:/tmp
      - ./docker/dbdata:/var/lib/mysql
      - ./docker/mysql:/docker-entrypoint-initdb.d
      - "/etc/localtime:/etc/localtime:ro"
    environment:
      - TZ=${TZ:-UTC}
      - MYSQL_DATABASE=env_db
      # Palavra-passe real deve estar em `.env` (DB_PASSWORD na raiz — compose lê automaticamente).
      - MYSQL_ROOT_PASSWORD=${DB_PASSWORD:-root}
    networks:
      - app-network

  phpmyadmin:
    build: docker/pma
    restart: always
    container_name: shopping-phpmyadmin
    depends_on:
      db:
        condition: service_healthy
    ports:
      - 8081:80
    volumes:
      - ./docker/pma:/var/www/app/
    environment:
      - PMA_USER=root
      - PMA_PASSWORD=${DB_PASSWORD:-root}
      - PMA_HOST=db
      - MYSQL_ROOT_PASSWORD=${DB_PASSWORD:-root}
      - PMA_ARBITRARY=1
      - PMA_PORT=3306
      - UPLOAD_LIMIT=64M
    networks:
      - app-network

networks:
  app-network:
    driver: bridge
