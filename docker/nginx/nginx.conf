# HTTP; HTTPS (443) ativado pelo entrypoint (PEM em docker/nginx/ssl/ ou cert ephemero).
server {
    listen 80 default_server;
    server_name app.lojashoppcell.com.br localhost;
    index index.php index.html;
    root /var/www/public;

    # Let's Encrypt HTTP-01 (certbot --webroot -w docker/certbot/www no host → /var/www/docker/certbot/www)
    location ^~ /.well-known/acme-challenge/ {
        default_type "text/plain";
        root /var/www/docker/certbot/www;
        allow all;
    }

    include /var/www/docker/nginx/laravel-php.inc;
}
