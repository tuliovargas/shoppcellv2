# Com proxy laranja, o visitante usa HTTPS mas a Cloudflare fala à origem em HTTP:80 —
# Nginx usa $scheme=http. O cabeçalho X-Forwarded-Proto diz o esquema real.
# Laravel (TrustProxies) precisa de HTTP_X_FORWARDED_PROTO=https para secure(), URLs e cookies.
map $http_x_forwarded_proto $fcgi_forwarded_scheme {
    ''      $scheme;
    default $http_x_forwarded_proto;
}
