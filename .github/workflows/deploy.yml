name: Deploy (rsync → VPS)

# Fluxo:
#   1) checkout no runner
#   2) rsync do código até DEPLOY_APP_PATH na VPS (--exclude-from)
#   3) (opcional) ssh … sudo docker compose up -d --build
#
# Não há git pull/clonagem na VPS — apenas ficheiros copiados.
#
# Observação importante: rsync em pastas remotas COSTUMA usar transporte SSH
# (-e ssh). Ou seja, mesmo sem "chave de deploy Git" na VPS, quase sempre
# ainda será necessário UM segredo de autenticação para alcançar o servidor —
# habitualmente DEPLOY_SSH_PRIVATE_KEY só para esse acesso.
# Para rsync só por rede sem SSH (daemon na porta 873 ou outra), teria de
# ser outro playbook.
#
# Secrets:
#   DEPLOY_SSH_PRIVATE_KEY  — chave privada OpenSSH (RECOMENDADO: sem passphrase;
#                             PEM completa com -----BEGIN …----- e -----END …----- ).
# Troubleshooting "Permission denied (publickey)":
#   No servidor, ~/.ssh/authorized_keys do UTILIZADOR em DEPLOY_SSH_USER deve conter a
#   chave PÚBLICA que corresponde a este secret. Testa na tua máquina:
#   ssh -p PORTA -i caminho/chave opc@HOST
# Se falhar igual, o problema é na VPS authorized_keys/sshd antes do GitHub.
# Opcional:
#   — (adicione outros segredos se usares método em que estas variáveis apontariam só para SCP/rsync doutro tipo)
#
# Variables ou Secrets (mesmos nomes — o workflow usa primeiro Variables, senão Secrets):
#   DEPLOY_SSH_HOST, DEPLOY_SSH_USER, DEPLOY_APP_PATH
# Opcional:
#   DEPLOY_SSH_PORT (default 22)
#   DEPLOY_COMPOSE_FILE (default docker-compose.yaml em script remoto)
#   SKIP_DOCKER_RESTART = true para não subir/atualizar stacks com docker compose na VPS.
#   DEPLOY_COMPOSE_BUILD = true para correr também --build após código copiado (Dockerfiles/context).
#                             Por omissão é só docker compose up -d — imagens ficam iguais; código PHP atualiza pelo volume montado (.:/var/www).
#   DEPLOY_RSYNC_DELETE = true para ativar --delete no rsync (por omissão NÃO há --delete,
#                             mais seguro para ficheiros que existem só no servidor.)
#   SKIP_ARTISAN_AFTER_DEPLOY = true para NÃO executar migrate + optimize:clear após compose.
#   DEPLOY_DOCKER_SERVICE = nome do serviço PHP no compose (default: app — usado em docker compose exec …).
#
# Dados típicos a não pisar/registar em exclude: ver .github/rsync-exclude.txt
# (principal: docker/dbdata = ficheiros do MariaDB dentro do projeto; uploads em storage/, etc.)

concurrency:
  group: deploy-shoppcell
  cancel-in-progress: true

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  rsync-deploy:
    runs-on: ubuntu-latest

    # Host/utilizador/porta/path: Variables OU Secrets (Secrets não aparecem em vars.*).
    env:
      DEPLOY_HOST: ${{ vars.DEPLOY_SSH_HOST != '' && vars.DEPLOY_SSH_HOST || secrets.DEPLOY_SSH_HOST }}
      DEPLOY_USER: ${{ vars.DEPLOY_SSH_USER != '' && vars.DEPLOY_SSH_USER || secrets.DEPLOY_SSH_USER }}
      DEPLOY_DEST: ${{ vars.DEPLOY_APP_PATH != '' && vars.DEPLOY_APP_PATH || secrets.DEPLOY_APP_PATH }}
      DEPLOY_PORT: ${{ vars.DEPLOY_SSH_PORT != '' && vars.DEPLOY_SSH_PORT || secrets.DEPLOY_SSH_PORT != '' && secrets.DEPLOY_SSH_PORT || '22' }}
      DEPLOY_RSYNC_DELETE: ${{ vars.DEPLOY_RSYNC_DELETE != '' && vars.DEPLOY_RSYNC_DELETE || secrets.DEPLOY_RSYNC_DELETE }}
      DEPLOY_COMPOSE_BUILD: ${{ vars.DEPLOY_COMPOSE_BUILD != '' && vars.DEPLOY_COMPOSE_BUILD || secrets.DEPLOY_COMPOSE_BUILD }}

    steps:
      - uses: actions/checkout@v4

      # Falha clara se faltar host utilizador ou path em Variables OU Secrets (Settings → Secrets and variables → Actions).
      - name: Verificar config de deploy
        run: |
          set -euo pipefail
          err=0
          if [ -z "${DEPLOY_HOST:-}" ]; then echo "::error::Define DEPLOY_SSH_HOST como Repository variable ou Secret."; err=1; fi
          if [ -z "${DEPLOY_USER:-}" ]; then echo "::error::Define DEPLOY_SSH_USER como Repository variable ou Secret."; err=1; fi
          if [ -z "${DEPLOY_DEST:-}" ]; then echo "::error::Define DEPLOY_APP_PATH como Repository variable ou Secret."; err=1; fi
          exit $err

      # Necessário se usares SSH (rsync -e ssh) e comando remoto com docker compose.
      # Grava ~/.ssh/id_rsa (chmod 600). rsync e ssh passam sempre -i e IdentitiesOnly=yes.
      - name: Chave SSH (transporte rsync / comando remoto)
        uses: shimataro/ssh-key-action@v2
        with:
          key: ${{ secrets.DEPLOY_SSH_PRIVATE_KEY }}
          known_hosts: unnecessary
          if_key_exists: replace

      - name: known_hosts para a VPS
        run: |
          set -e
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          ssh-keyscan -p "${DEPLOY_PORT}" -T 60 -H "${DEPLOY_HOST}" >> ~/.ssh/known_hosts

      # Falha rápido com erro claro se authorized_keys não tiver o par da chave do secret.
      - name: Testar SSH (autenticação por chave)
        run: |
          set -euo pipefail
          SSH=(
            ssh
            -p "${DEPLOY_PORT}"
            -o BatchMode=yes
            -o IdentitiesOnly=yes
            -o StrictHostKeyChecking=yes
            -i "${HOME}/.ssh/id_rsa"
          )
          "${SSH[@]}" -o ConnectTimeout=15 "${DEPLOY_USER}@${DEPLOY_HOST}" "echo ok"

      - name: rsync
        run: |
          set -euo pipefail
          test -n "${DEPLOY_DEST}" || { echo "::error::Defina DEPLOY_APP_PATH como variable ou Secret."; exit 1; }
          RSYNC_SSH=(
            ssh
            -p "${DEPLOY_PORT}"
            -o BatchMode=yes
            -o IdentitiesOnly=yes
            -o StrictHostKeyChecking=yes
            -i "${HOME}/.ssh/id_rsa"
          )
          EXTRA_DELETE=""
          if [ "${DEPLOY_RSYNC_DELETE}" = "true" ]; then
            EXTRA_DELETE="--delete"
            echo "::notice::rsync com --delete (revê .github/rsync-exclude.txt + backups antes)."
          else
            echo "::notice::rsync SEM --delete por omissão (mais seguro para ficheiros só no servidor)."
          fi
          rsync -avz ${EXTRA_DELETE} \
            --exclude-from=".github/rsync-exclude.txt" \
            -e "${RSYNC_SSH[*]}" \
            "./" \
            "${DEPLOY_USER}@${DEPLOY_HOST}:${DEPLOY_DEST}/"

      - name: docker compose na VPS (SSH)
        if: ${{ vars.SKIP_DOCKER_RESTART != 'true' }}
        env:
          COMPOSE: ${{ vars.DEPLOY_COMPOSE_FILE != '' && vars.DEPLOY_COMPOSE_FILE || 'docker-compose.yaml' }}
          REMOTE_HOME: ${{ env.DEPLOY_DEST }}
        run: |
          set -euo pipefail
          EXTRA_BUILD=""
          if [ "${DEPLOY_COMPOSE_BUILD}" = "true" ]; then
            EXTRA_BUILD=" --build"
            echo "::notice::docker compose up com --build (DEPLOY_COMPOSE_BUILD=true)."
          else
            echo "::notice::docker compose up -d SEM --build; alteraste Dockerfiles/context? põe DEPLOY_COMPOSE_BUILD=true."
          fi
          ssh \
            -p "${DEPLOY_PORT}" \
            -o BatchMode=yes \
            -o IdentitiesOnly=yes \
            -o StrictHostKeyChecking=yes \
            -i "${HOME}/.ssh/id_rsa" \
            "${DEPLOY_USER}@${DEPLOY_HOST}" \
            "set -euo pipefail; cd \"${REMOTE_HOME}\"; sudo docker compose -f \"${COMPOSE}\" up -d${EXTRA_BUILD}"

      # Estado das migrations → migrate --force (sem interação) → limpar caches (config/cached views/routes, etc.).
      # O .env na VPS não entra no rsync — ver .github/rsync-exclude.txt (.env está excluído).
      - name: Laravel na VPS — migrations + limpar caches
        if: ${{ vars.SKIP_ARTISAN_AFTER_DEPLOY != 'true' }}
        env:
          COMPOSE: ${{ vars.DEPLOY_COMPOSE_FILE != '' && vars.DEPLOY_COMPOSE_FILE || 'docker-compose.yaml' }}
          REMOTE_HOME: ${{ env.DEPLOY_DEST }}
          SERVICE: ${{ vars.DEPLOY_DOCKER_SERVICE != '' && vars.DEPLOY_DOCKER_SERVICE || 'app' }}
        run: |
          set -euo pipefail
          ssh \
            -p "${DEPLOY_PORT}" \
            -o BatchMode=yes \
            -o IdentitiesOnly=yes \
            -o StrictHostKeyChecking=yes \
            -i "${HOME}/.ssh/id_rsa" \
            "${DEPLOY_USER}@${DEPLOY_HOST}" \
            "set -euo pipefail; cd \"${REMOTE_HOME}\"; \
            echo 'À espera do MariaDB (evita HY000 Connection refused antes do servidor aceitar tráfego)...'; \
            ok=0; for i in \$(seq 1 120); do \
              if sudo docker compose -f \"${COMPOSE}\" exec -T db mysqladmin ping -h 127.0.0.1 -uroot -proot --silent 2>/dev/null; then ok=1; echo 'MariaDB respondeu.'; break; fi; \
              sleep 2; \
            done; \
            if [ \"\$ok\" != 1 ]; then echo '::error::Timeout (4 min): MariaDB não responde no serviço db. Verifica o contentor db e .env DB_HOST=db.' 1>&2; exit 1; fi; \
            sudo docker compose -f \"${COMPOSE}\" exec -T \"${SERVICE}\" php artisan migrate:status --no-ansi; \
            sudo docker compose -f \"${COMPOSE}\" exec -T \"${SERVICE}\" php artisan migrate --force --no-interaction; \
            sudo docker compose -f \"${COMPOSE}\" exec -T \"${SERVICE}\" php artisan optimize:clear --no-interaction"
